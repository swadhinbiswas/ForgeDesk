name: publish-python

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev fuse3 libfuse2

      - name: Install build tooling
        run: |
          uv pip install --upgrade pip
          uv pip install maturin build twine

      - name: Verify version alignment
        run: python scripts/ci/verify_version_alignment.py --workspace-root . --json

      - name: Build wheel and sdist
        run: |
          python -m maturin build --release --out dist
          python -m build --sdist --outdir dist

      - name: Check distributions
        run: uv run twine check dist/*.whl dist/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/forgedesk
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
