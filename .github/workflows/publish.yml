# ============================================================
# ForgeDesk Release & Publish Pipeline
# ============================================================
# Triggered on version tags (v*). Builds wheels, publishes to
# NPM and PyPI, creates GitHub Release with checksums.
# ============================================================

name: Release

on:
  push:
    tags: ['v*']

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

env:
  PYTHON_VERSION: '3.14'
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Pre-flight Validation
  # ──────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - name: Verify version alignment
        run: python scripts/ci/verify_version_alignment.py --workspace-root . --json

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          
          # Check pyproject.toml
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) != pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi
          
          echo "✅ Version alignment verified: $TAG_VERSION"

  # ──────────────────────────────────────────────────────────
  # Build Python Wheels (multi-platform)
  # ──────────────────────────────────────────────────────────
  build-wheels:
    name: Wheels (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: universal2-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Setup virtualenv
        run: |
          uv venv

      - name: Install maturin
        run: |
          uv pip install maturin

      - name: Install Rust target for macOS
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: uv run maturin build --release --out dist --target ${{ matrix.target }} --manylinux 2014

      - name: Build wheels (macOS)
        if: matrix.os == 'macos-latest'
        run: uv run maturin build --release --out dist --target ${{ matrix.target }}

      - name: Build wheels (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run maturin build --release --out dist --target ${{ matrix.target }}

      - name: Verify wheel
        run: |
          uv pip install twine
          uv run twine check dist/*.whl 2>$null || true
          uv run twine check dist/*.tar.gz 2>$null || true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/
          retention-days: 5

  # ──────────────────────────────────────────────────────────
  # Build Source Distribution
  # ──────────────────────────────────────────────────────────
  build-sdist:
    name: Source Distribution
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - name: Build sdist (Maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Verify sdist
        run: |
          uv pip install twine
          uv run twine check dist/*.whl 2>$null || true
          uv run twine check dist/*.tar.gz 2>$null || true

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/
          retention-days: 5

  # ──────────────────────────────────────────────────────────
  # Build & Publish NPM Packages
  # ──────────────────────────────────────────────────────────
  publish-npm:
    name: Publish NPM
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Fix lockfile registry
        run: |
          # package-lock.json was generated with npmmirror (Chinese mirror)
          # Rewrite to official npm registry for GitHub Actions
          sed -i 's|https://registry.npmmirror.com|https://registry.npmjs.org|g' package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --if-present --workspaces

      - name: Publish packages
        run: |
          set -uo pipefail
          VERSION="${{ needs.preflight.outputs.version }}"
          FAILED_PKGS=""
          for pkg_dir in packages/api packages/cli packages/vite-plugin packages/create-forge-app; do
            if [ -d "$pkg_dir" ]; then
              PKG_NAME=$(node -p "require('./$pkg_dir/package.json').name")
              echo "📦 Publishing $PKG_NAME@$VERSION from $pkg_dir..."

              # Skip if this exact version already exists on npm
              if npm view "$PKG_NAME@$VERSION" version &>/dev/null; then
                echo "⏭️  $PKG_NAME@$VERSION already exists on npm, skipping"
                continue
              fi

              cd "$pkg_dir"
              if npm publish --access public --provenance; then
                echo "✅ Published $PKG_NAME@$VERSION"
              else
                echo "❌ FAILED to publish $PKG_NAME@$VERSION"
                FAILED_PKGS="$FAILED_PKGS $PKG_NAME"
              fi
              cd ../..
            fi
          done

          if [ -n "$FAILED_PKGS" ]; then
            echo ""
            echo "❌ Some packages failed to publish:$FAILED_PKGS"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          set -euo pipefail
          VERSION="${{ needs.preflight.outputs.version }}"
          FAILED=0
          for pkg in @forgedesk/api @forgedesk/cli @forgedesk/vite-plugin @forgedesk/create-forge-app; do
            echo "🔍 Checking $pkg@$VERSION..."
            RETRY=0
            while [ $RETRY -lt 12 ]; do
              if npm view "$pkg@$VERSION" version &>/dev/null; then
                echo "✅ $pkg@$VERSION is available on npm"
                break
              else
                echo "⏳ Waiting for propagation (attempt $((RETRY+1))/12)..."
                sleep 10
                RETRY=$((RETRY+1))
              fi
            done
            if [ $RETRY -eq 12 ]; then
              echo "❌ $pkg@$VERSION NOT found on npm after 2 minutes"
              FAILED=1
            fi
          done
          exit $FAILED

  # ──────────────────────────────────────────────────────────
  # Publish to PyPI
  # ──────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/forgedesk
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: |
          echo "📦 Release artifacts:"
          ls -la dist/
          echo ""
          echo "📊 Total size:"
          du -sh dist/

      - name: Remove checksum files before publishing
        run: |
          rm -f dist/checksums-sha256.txt
          echo "✅ Cleaned up checksum files"

      - name: Check if version already exists on PyPI
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          if pip index versions forgedesk 2>/dev/null | grep -q "$VERSION"; then
            echo "⏭️  forgedesk==$VERSION already exists on PyPI, skipping publish"
            echo "ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
          else
            echo "ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
            echo "📦 Publishing forgedesk==$VERSION to PyPI..."
          fi

      - name: Publish to PyPI
        if: env.ALREADY_PUBLISHED != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Verify PyPI publication
        run: |
          sleep 10
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "Checking forgedesk@$VERSION on PyPI..."
          pip install forgedesk==$VERSION --dry-run 2>/dev/null && echo "✅ Published" || echo "⚠️ Propagation pending"

  # ──────────────────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [preflight, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > FORGEDESK-${{ needs.preflight.outputs.version }}-CHECKSUMS.txt
          cat FORGEDESK-${{ needs.preflight.outputs.version }}-CHECKSUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ForgeDesk v${{ needs.preflight.outputs.version }}
          body: |
            ## ForgeDesk v${{ needs.preflight.outputs.version }}
            
            ### Installation
            
            **Python (pip):**
            ```bash
            pip install forgedesk==${{ needs.preflight.outputs.version }}
            ```
            
            **NPM:**
            ```bash
            npm install @forgedesk/api@${{ needs.preflight.outputs.version }}
            ```
            
            ### Checksums
            See `FORGEDESK-${{ needs.preflight.outputs.version }}-CHECKSUMS.txt` for SHA-256 verification.
            
            ### What's Changed
            See [CHANGELOG.md](CHANGELOG.md) for full details.
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.preflight.outputs.version, '-') }}

  # ──────────────────────────────────────────────────────────
  # Post-release Verification
  # ──────────────────────────────────────────────────────────
  post-release:
    name: Post-release Verification
    needs: [preflight, github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify GitHub Release
        run: |
          TAG="${{ needs.preflight.outputs.tag }}"
          echo "Checking release $TAG..."
          
          # Use GitHub API to verify release exists
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$RELEASE_URL")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ GitHub Release created successfully"
          else
            echo "❌ GitHub Release not found (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| PyPI | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.preflight.outputs.version }}" >> $GITHUB_STEP_SUMMARY
