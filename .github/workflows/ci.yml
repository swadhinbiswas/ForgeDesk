# ============================================================
# ForgeDesk CI Pipeline
# ============================================================
# Runs on every push to main/release branches and all PRs.
# Enforces: Rust (fmt, clippy, test), Python (ruff, mypy, pytest),
#           Node (build), Security (CodeQL), Version alignment.
# ============================================================

name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
CARGO_TERM_COLOR: always
CARGO_INCREMENTAL: 0
# Only treat warnings as errors on Linux (muda unsafe warnings on Windows are pedantic)
RUSTFLAGS: ${{ runner.os == 'Linux' && '-D warnings' || '' }}
# Use system linker on Linux so it can find libxdo in standard paths
CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: ld
# Ensure libxdo is findable at build time
LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
UV_SYSTEM_PYTHON: 1
PYTHON_VERSION: '3.14'
NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────
  # Rust Checks (fmt, clippy, test)
  # ──────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-xdotool-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-${{ runner.os }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy linter
        run: cargo clippy --all-targets --all-features

      - name: Run tests
        run: cargo test --all-features

  # ──────────────────────────────────────────────────────────
  # Python Checks (lint, type check, test)
  # ──────────────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-xdotool-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Lint with Ruff (Linux only)
        if: runner.os == 'Linux'
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Pytest
        run: uv run pytest -v --tb=short

  # ──────────────────────────────────────────────────────────
  # Node.js Checks (install, build)
  # ──────────────────────────────────────────────────────────
  node:
    name: Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --if-present --workspaces

      - name: Check package sizes
        run: |
          for pkg in packages/api packages/vite-plugin packages/create-forge-app; do
            if [ -d "$pkg" ]; then
              echo "=== $pkg ==="
              cd $pkg
              npm pack --dry-run 2>&1 | tail -5
              cd ../..
            fi
          done

  # ──────────────────────────────────────────────────────────
  # Version Alignment Check
  # ──────────────────────────────────────────────────────────
  version-check:
    name: Version Alignment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify version alignment
        run: python scripts/ci/verify_version_alignment.py --workspace-root . --json

  # ──────────────────────────────────────────────────────────
  # Security Scanning (CodeQL)
  # ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ──────────────────────────────────────────────────────────
  # Dependency Audit
  # ──────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Audit npm dependencies
        run: npm audit --audit-level=high || true

      - name: Check for outdated dependencies
        run: npm outdated || true

  # ──────────────────────────────────────────────────────────
  # CI Status Gate (all checks must pass)
  # ──────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [rust, python, node, version-check, security, audit]
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.rust.result }}" == "failure" || \
                "${{ needs.python.result }}" == "failure" || \
                "${{ needs.node.result }}" == "failure" || \
                "${{ needs.version-check.result }}" == "failure" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
