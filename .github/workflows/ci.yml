name: CI Pipelines

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

env:
  CARGO_TERM_COLOR: always
  UV_SYSTEM_PYTHON: 1

jobs:
  rust-tests:
    name: Rust Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-xdotool-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2
      - name: Cargo fmt (Check)
        run: cargo fmt --all -- --check
      - name: Cargo clippy (Linter)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo test
        run: cargo test --all-features

  python-tests:
    name: Python Lint & Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-xdotool-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: uv pip install -e ".[dev]"
      - name: Lint with Ruff
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          uv pip install ruff
          uv run ruff check .
          uv run ruff format --check .
      - name: Run Pytest
        run: uv run pytest -v

  node-tests:
    name: NPM Ecosystem Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Workspace Dependencies
        run: npm ci
      - name: Test / Build Packages
        run: npm run build --if-present --workspaces
