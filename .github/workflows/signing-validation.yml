name: signing-validation

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'release-*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-gpg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: bash
        run: |
          uv venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev fuse3 libfuse2

      - name: Gate release branch
        run: python scripts/ci/require_release_branch.py --json

      - name: Install tooling
        run: |
          uv pip install --upgrade pip
          uv pip install -e . maturin nuitka pytest pytest-cov
          sudo apt-get update
          sudo apt-get install -y gnupg xvfb fuse libfuse2
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Build native extension
        run: uv run maturin develop

      - name: Generate CI GPG key
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          gpg --batch --quick-gen-key "Forge CI <ci@forge.dev>" default default never
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"

      - name: Prepare signed fixture
        shell: bash
        run: |
          python scripts/ci/prepare_release_fixture.py \
            --source examples/forge_todo \
            --dest .ci/linux-sign \
            --formats "dir,appimage" \
            --app-id "dev.forge.todo.sign.linux" \
            --product-name "Forge Todo Linux Signed" \
            --signing-mode linux-gpg

      - name: Build signed release
        shell: bash
        run: |
          python -m forge_cli.main release .ci/linux-sign --result-format json > release-linux.json
          cat release-linux.json

      - name: Smoke-test signed installers
        run: python scripts/ci/smoke_installers.py --build-result release-linux.json

      - name: Verify release artifacts
        run: python scripts/ci/verify_release_artifacts.py --build-result release-linux.json

      - uses: actions/upload-artifact@v4
        with:
          name: signing-linux
          path: |
            release-linux.json
            .ci/linux-sign/dist

  windows-signtool:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: powershell
        run: |
          uv venv
          "$env:GITHUB_WORKSPACE\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VIRTUAL_ENV=$env:GITHUB_WORKSPACE\.venv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install tooling
        shell: powershell
        run: |
          uv pip install --upgrade pip
          uv pip install -e . maturin nuitka pytest pytest-cov
          choco install -y nsis wixtoolset

      - name: Build native extension
        run: uv run maturin develop

      - name: Generate self-signed code signing certificate
        shell: powershell
        run: |
          $password = ConvertTo-SecureString -String 'ForgeCI123!' -Force -AsPlainText
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject 'CN=Forge CI' -CertStoreLocation Cert:\CurrentUser\My
          $pfxPath = Join-Path $env:RUNNER_TEMP 'forge-ci-signing.pfx'
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $password | Out-Null
          "FORGE_WINDOWS_CERT_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FORGE_WINDOWS_CERT_PASSWORD=ForgeCI123!" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FORGE_WINDOWS_TIMESTAMP_URL=http://timestamp.digicert.com" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare signed fixture
        shell: bash
        run: |
          python scripts/ci/prepare_release_fixture.py \
            --source examples/forge_todo \
            --dest .ci/windows-sign \
            --formats "dir,msi,nsis" \
            --app-id "dev.forge.todo.sign.windows" \
            --product-name "Forge Todo Windows Signed" \
            --signing-mode windows-ci

      - name: Build signed release
        shell: bash
        run: |
          python -m forge_cli.main release .ci/windows-sign --result-format json > release-windows.json
          cat release-windows.json

      - name: Smoke-test signed installers
        run: python scripts/ci/smoke_installers.py --build-result release-windows.json

      - name: Verify release artifacts
        run: python scripts/ci/verify_release_artifacts.py --build-result release-windows.json

      - uses: actions/upload-artifact@v4
        with:
          name: signing-windows
          path: |
            release-windows.json
            .ci/windows-sign/dist

  macos-notarize:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: bash
        run: |
          uv venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Detect macOS signing configuration
        id: macos_gate
        shell: bash
        env:
          FORGE_MACOS_SIGN_CERT_BASE64: ${{ secrets.FORGE_MACOS_SIGN_CERT_BASE64 }}
          FORGE_MACOS_SIGN_CERT_PASSWORD: ${{ secrets.FORGE_MACOS_SIGN_CERT_PASSWORD }}
          FORGE_MACOS_NOTARY_PROFILE: ${{ secrets.FORGE_MACOS_NOTARY_PROFILE }}
          FORGE_MACOS_NOTARY_APPLE_ID: ${{ secrets.FORGE_MACOS_NOTARY_APPLE_ID }}
          FORGE_MACOS_NOTARY_TEAM_ID: ${{ secrets.FORGE_MACOS_NOTARY_TEAM_ID }}
          FORGE_MACOS_NOTARY_PASSWORD: ${{ secrets.FORGE_MACOS_NOTARY_PASSWORD }}
        run: |
          if [[ -n "$FORGE_MACOS_SIGN_CERT_BASE64" && -n "$FORGE_MACOS_SIGN_CERT_PASSWORD" && ( -n "$FORGE_MACOS_NOTARY_PROFILE" || ( -n "$FORGE_MACOS_NOTARY_APPLE_ID" && -n "$FORGE_MACOS_NOTARY_TEAM_ID" && -n "$FORGE_MACOS_NOTARY_PASSWORD" ) ) ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping macOS notarization: required secrets are missing."
          fi

      - name: Install tooling
        if: steps.macos_gate.outputs.enabled == 'true'
        run: |
          uv pip install --upgrade pip
          uv pip install -e . maturin nuitka pytest pytest-cov

      - name: Build native extension
        if: steps.macos_gate.outputs.enabled == 'true'
        run: uv run maturin develop

      - name: Import signing certificate
        if: steps.macos_gate.outputs.enabled == 'true'
        env:
          FORGE_MACOS_SIGN_CERT_BASE64: ${{ secrets.FORGE_MACOS_SIGN_CERT_BASE64 }}
          FORGE_MACOS_SIGN_CERT_PASSWORD: ${{ secrets.FORGE_MACOS_SIGN_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/forge-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/forge-signing.p12"
          export CERT_PATH
          python -c "import os, base64, pathlib; pathlib.Path(os.environ['CERT_PATH']).write_bytes(base64.b64decode(os.environ['FORGE_MACOS_SIGN_CERT_BASE64']))"
          security create-keychain -p '' "$KEYCHAIN_PATH"
          security unlock-keychain -p '' "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$FORGE_MACOS_SIGN_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k '' "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' 'NR==1 {print $2}')
          echo "FORGE_MACOS_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Export notarization env
        if: steps.macos_gate.outputs.enabled == 'true'
        run: |
          echo "FORGE_MACOS_NOTARY_PROFILE=${{ secrets.FORGE_MACOS_NOTARY_PROFILE }}" >> "$GITHUB_ENV"
          echo "FORGE_MACOS_NOTARY_APPLE_ID=${{ secrets.FORGE_MACOS_NOTARY_APPLE_ID }}" >> "$GITHUB_ENV"
          echo "FORGE_MACOS_NOTARY_TEAM_ID=${{ secrets.FORGE_MACOS_NOTARY_TEAM_ID }}" >> "$GITHUB_ENV"
          echo "FORGE_MACOS_NOTARY_PASSWORD=${{ secrets.FORGE_MACOS_NOTARY_PASSWORD }}" >> "$GITHUB_ENV"
          echo "FORGE_MACOS_TIMESTAMP_URL=https://timestamp.apple.com/ts01" >> "$GITHUB_ENV"

      - name: Prepare notarized fixture
        if: steps.macos_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          python scripts/ci/prepare_release_fixture.py \
            --source examples/forge_todo \
            --dest .ci/macos-sign \
            --formats "dir,app,dmg" \
            --app-id "dev.forge.todo.sign.macos" \
            --product-name "Forge Todo macOS Signed" \
            --signing-mode macos-ci

      - name: Build notarized release
        if: steps.macos_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          python -m forge_cli.main release .ci/macos-sign --result-format json > release-macos.json
          cat release-macos.json

      - name: Smoke-test notarized installers
        if: steps.macos_gate.outputs.enabled == 'true'
        run: python scripts/ci/smoke_installers.py --build-result release-macos.json

      - name: Verify release artifacts
        if: steps.macos_gate.outputs.enabled == 'true'
        run: python scripts/ci/verify_release_artifacts.py --build-result release-macos.json

      - uses: actions/upload-artifact@v4
        if: steps.macos_gate.outputs.enabled == 'true'
        with:
          name: signing-macos
          path: |
            release-macos.json
            .ci/macos-sign/dist