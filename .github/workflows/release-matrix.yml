name: release-matrix

on:
  push:
    branches: [main, master, 'release/**']
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            formats: dir,deb,appimage,flatpak
            formats_key: dir-deb-appimage-flatpak
            app_id: dev.forge.todo.linux
            product_name: Forge Todo Linux
          - os: macos-latest
            formats: dir,app,dmg
            formats_key: dir-app-dmg
            app_id: dev.forge.todo.macos
            product_name: Forge Todo macOS
          - os: windows-latest
            formats: dir,msi,nsis
            formats_key: dir-msi-nsis
            app_id: dev.forge.todo.windows
            product_name: Forge Todo Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure virtualenv paths
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Configure virtualenv paths
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          "$env:GITHUB_WORKSPACE\.venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VIRTUAL_ENV=$env:GITHUB_WORKSPACE\.venv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py314-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - name: Install Linux native build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev fuse3 libfuse2

      - name: Gate release branch
        if: github.event_name != 'pull_request'
        run: python scripts/ci/require_release_branch.py --json

      - name: Ensure Python build tooling (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ ! -x "$GITHUB_WORKSPACE/.venv/bin/python" ]; then
            uv venv
          fi
          uv pip install --upgrade pip
          uv pip install -e .
          if ! uv run python -c "import importlib.util,sys; req=['maturin','nuitka','pytest','pytest_cov']; sys.exit(0 if all(importlib.util.find_spec(n) for n in req) else 1)"; then
            uv pip install maturin nuitka pytest pytest-cov
          fi

      - name: Ensure Python build tooling (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\.venv\Scripts\python.exe")) {
            uv venv
          }
          uv pip install --upgrade pip
          uv pip install -e . maturin nuitka pytest pytest-cov

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder xvfb fuse3 libfuse2 desktop-file-utils
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y nsis wixtoolset

      - name: Build native extension (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if ! uv run python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('maturin') else 1)"; then
            uv pip install maturin
          fi
          uv run maturin develop

      - name: Build native extension (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          uv run python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('maturin') else 1)"
          if ($LASTEXITCODE -ne 0) {
            uv pip install maturin
          }
          uv run maturin develop

      - name: Validate repo
        run: |
          cargo check
          python -m pytest -q tests/test_app.py tests/test_cli.py tests/test_config.py

      - name: Prepare release fixture
        shell: bash
        run: |
          python scripts/ci/prepare_release_fixture.py \
            --source "$GITHUB_WORKSPACE/examples/forge_todo" \
            --dest "$GITHUB_WORKSPACE/.ci/forge_todo" \
            --formats "${{ matrix.formats }}" \
            --app-id "${{ matrix.app_id }}" \
            --product-name "${{ matrix.product_name }}"

      - name: Restore previous release state cache
        id: cache-release-state-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            build-result.json
            .ci/forge_todo/dist
          key: release-state-${{ runner.os }}-${{ matrix.formats_key }}-${{ github.sha }}
          restore-keys: |
            release-state-${{ runner.os }}-${{ matrix.formats_key }}-${{ github.sha }}-

      - name: Build release fixture
        shell: bash
        run: |
          set +e
          python -m forge_cli.main release "$GITHUB_WORKSPACE/.ci/forge_todo" --result-format json > build-result.json
          release_exit=$?
          set -e
          cat build-result.json
          exit $release_exit

      - name: Save release state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            build-result.json
            .ci/forge_todo/dist
          key: release-state-${{ runner.os }}-${{ matrix.formats_key }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Verify release artifacts
        run: python scripts/ci/verify_release_artifacts.py --build-result build-result.json

      - name: Smoke-test installers
        run: python scripts/ci/smoke_installers.py --build-result build-result.json

      - name: Cleanup Flatpak build workdir
        if: always() && runner.os == 'Linux'
        shell: bash
        run: rm -rf "$GITHUB_WORKSPACE/.ci/forge_todo/dist/flatpak-build"

      - name: Upload build result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-result-${{ runner.os }}
          path: |
            build-result.json
            .ci/forge_todo/dist

  publish:
    needs: build-and-smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: published-artifacts

      - name: Upload aggregated release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: published-artifacts
