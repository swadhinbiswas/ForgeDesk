name: publish-npm

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm (true) or only pack (false)'
        required: false
        default: 'false'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package-dir:
          - packages/api
          - packages/cli
          - packages/create-forge-app
          - packages/vite-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv

        uses: astral-sh/setup-uv@v3

        with:

          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version alignment
        run: python scripts/ci/verify_version_alignment.py --workspace-root . --json

      - name: Publish package
        if: github.event_name == 'release' || github.event.inputs.publish == 'true'
        working-directory: ${{ matrix.package-dir }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pack package
        if: github.event_name != 'release' && github.event.inputs.publish != 'true'
        working-directory: ${{ matrix.package-dir }}
        run: npm pack
