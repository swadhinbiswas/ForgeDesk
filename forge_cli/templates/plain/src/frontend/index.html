<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}}</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>{{PROJECT_NAME}}</h1>
            <p class="subtitle">What needs to be done?</p>
        </header>

        <main class="todo-container">
            <div class="input-wrapper">
                <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off" />
                <button id="addBtn" class="btn-primary">Add</button>
            </div>

            <div class="filters">
                <button class="filter active" data-filter="all">All</button>
                <button class="filter" data-filter="active">Active</button>
                <button class="filter" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="todo-footer">
                <span id="itemsLeft">0 items left</span>
                <button id="clearCompleted" class="btn-text">Clear completed</button>
            </div>
        </main>

        <footer class="app-footer">
            <p>Press <kbd>Enter</kbd> to add a todo</p>
            <p class="powered">Powered by <strong>Forge</strong> + Python</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
